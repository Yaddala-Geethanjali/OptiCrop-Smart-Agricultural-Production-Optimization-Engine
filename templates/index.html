<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌱</text></svg>">
<title>OptiCrop</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background:#f2f2f2;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:98%;
    height:96vh;
    background:white;
    border-radius:25px;
    overflow:hidden;
    display:flex;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

/* LEFT SIDE VIDEO */
.left{
    width:40%;
    height:100%;
}

.left video{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* RIGHT SIDE */
.right{
    width:60%;
    padding:30px 50px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.logo{
    font-size:36px;
    font-weight:700;
    margin-bottom:20px;
}

.tag{
    display:inline-block;
    background:#edf8e8;
    color:#68b92e;
    padding:10px 18px;
    border-radius:30px;
    font-size:13px;
    margin-bottom:20px;
    width:fit-content;
}

h1{
    font-size:50px;
    font-weight:800;
    line-height:1.25;
}

h1 span{
    color:#68b92e;
}

.line{
    width:220px;
    height:3px;
    background:#d7ecc8;
    margin:20px 0;
}

.description{
    color:#555;
    font-size:17px;
    line-height:1.7;
    max-width:90%;
}

.features{
    display:flex;
    gap:20px;
    margin-top:25px;
    flex-wrap:wrap;
}

.feature-box{
    text-align:center;
    font-size:24px;
    min-width:100px;
}

.feature-box p{
    font-size:13px;
    margin-top:8px;
    color:#333;
}

button{
    margin-top:25px;
    width:220px;
    padding:15px;
    background:#68b92e;
    color:white;
    border:none;
    border-radius:15px;
    font-size:18px;
    cursor:pointer;
    box-shadow:0 8px 18px rgba(104,185,46,0.3);
    transition:0.3s;
}

button:hover{
    background:#57a724;
    transform:translateY(-2px);
}
</style>

</head>
<body>

<div class="container">

    <div class="left">
        <video autoplay muted loop>
            <source src="{{ url_for('static', filename='sunflower.mp4') }}" type="video/mp4">
        </video>
    </div>

    <div class="right">

        <div class="logo">🌱 OptiCrop</div>

        <div class="tag">AI POWERED AGRICULTURE</div>

        <h1>
            Smart <span>Agriculture</span><br>
            Optimization
        </h1>

        <div class="line"></div>

        <p class="description">
            OptiCrop is an AI-powered crop recommendation system
            that helps farmers choose the best crops based on soil
            and environmental conditions.
        </p>

        <div class="features">

            <div class="feature-box">
                🌱
                <p>Smart Prediction</p>
            </div>

            <div class="feature-box">
                📊
                <p>High Accuracy</p>
            </div>

            <div class="feature-box">
                🌦
                <p>Weather Insights</p>
            </div>

            <div class="feature-box">
                💧
                <p>Soil Analysis</p>
            </div>

        </div>

        <button onclick="window.location.href='/prediction'">
            Get Started →
        </button>

    </div>

</div>

</body>
</html>
